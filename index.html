<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AV Compare Pro — 제품 비교 의사결정 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://aistudiocdn.com/react@^19.1.1/",
          "react": "https://aistudiocdn.com/react@^19.1.1",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
          "recharts": "https://aistudiocdn.com/recharts@^2.12.7",
          "react-window": "https://aistudiocdn.com/react-window@^1.8.10",
          "@types/react-window": "https://aistudiocdn.com/react-window@^1.8.8/index.d.ts"
        }
      }
    </script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Print: show only the comparison table (#print-area), drop the dark modal backdrop. */
      @media print {
        body { background: #fff !important; }
        .no-print { display: none !important; }
        body * { visibility: hidden; }
        #print-area, #print-area * { visibility: visible; }
        #print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          overflow: visible !important;
          max-height: none !important;
        }
        .fixed { position: static !important; background: #fff !important; }
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
